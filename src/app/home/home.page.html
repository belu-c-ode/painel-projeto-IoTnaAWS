<ion-header>
  <ion-toolbar>
    <ion-title>Painel de Enchentes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="status-card" [class.critico]="ultimo.nivel === 'critico'" [class.alerta]="ultimo.nivel === 'alerta'">
    <h1>{{ ultimo.nivel || '---' }}</h1>
    <p>Status atual do nível da água</p>
  </div>

  <div class="grid">
    <div class="card">
      <h2>{{ ultimo.temperatura }}°C</h2>
      <p>Temperatura</p>
    </div>

    <div class="card">
      <h2>{{ ultimo.umidade }}%</h2>
      <p>Umidade</p>
    </div>

    <div class="card">
      <h2>{{ ultimo.distancia }} cm</h2>
      <p>Distância</p>
    </div>
  </div>

  <div class="chart-card">
    <canvas id="grafico"></canvas>
  </div>

  <ion-button expand="block" (click)="carregarDados()">
    Atualizar agora
  </ion-button>

</ion-content>
